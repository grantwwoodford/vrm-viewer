<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VRM Viewer</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    if (new URLSearchParams(location.search).has('desktop')) {
      document.documentElement.classList.add('desktop');
    }
  </script>
  <script type="importmap">
  {
    "imports": {
      "three": "/vendor/three.module.min.js",
      "@pixiv/three-vrm": "/vendor/three-vrm.module.min.js",
      "@pixiv/three-vrm-animation": "/vendor/three-vrm-animation.module.min.js"
    }
  }
  </script>
</head>
<body>
  <main id="scene" aria-label="3D avatar"></main>

  <header class="topbar panel">
    <div class="brand"><span class="mark">V</span><strong>VRM VIEWER</strong></div>
    <span id="status" class="status">loading avatar</span>
    <button id="model-button" type="button">Load VRM</button>
    <button id="animation-button" type="button">Load VRMA</button>
    <input id="model-file" type="file" accept=".vrm,model/gltf-binary" hidden>
    <input id="animation-file" type="file" accept=".vrma,model/gltf-binary" hidden>
  </header>

  <section class="speech panel" aria-label="Speech controls">
    <label class="grow" for="text">Speech</label>
    <textarea id="text" rows="2" maxlength="2000" placeholder="Type something for the avatar to say..."></textarea>
    <div class="settings">
      <label>Emotion
        <select id="emotion">
          <option>neutral</option><option>happy</option><option>sad</option>
          <option>surprised</option><option>angry</option><option>relaxed</option>
          <option>shy</option><option>thinking</option><option>playful</option><option>tender</option>
        </select>
      </label>
      <label>Voice
        <select id="voice">
          <option value="default">Heart</option>
          <option value="late_night">Nicole</option>
          <option value="expressive">Bella</option>
        </select>
      </label>
      <label>Speed
        <input id="speed" type="range" min="0.7" max="1.3" step="0.05" value="1">
      </label>
      <button id="speak" class="primary" type="button">Speak</button>
      <button id="stop" type="button" disabled>Stop</button>
    </div>
    <p id="message" role="status">Enter sends speech. Shift+Enter adds a new line.</p>
  </section>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
